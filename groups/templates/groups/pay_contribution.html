{% extends 'groups/base.html' %}

{% block title %}Pay Contribution{% endblock %}

{% block content %}
    <h1>Pay Contribution</h1>
    <p>Paying for: {{ membership.member.full_name }} - {{ membership.chama.name }}</p>
    <form method="POST">
        {% csrf_token %}
        <label>Amount (KES):</label><br>
        <input type="number" name="amount" required><br><br>

        <label>Phone Number (format 2547XXXXXXXX):</label><br>
        <input type="text" name="phone_number" required><br><br>

        <button type="submit">Pay via M-Pesa</button>
    </form>
{% endblock %}
